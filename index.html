<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메르센 트위스터</title>
    <style>
        /* 기본 여백 제거 및 검은색 배경 설정 */
        body {
            margin: 0;
            padding: 0;
            background-color: #000; /* 사진이 돋보이도록 검은 배경 사용 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* 화면 전체 높이 사용 */
            overflow: hidden; /* 스크롤바 숨김 */
        }

        /* 사진과 버튼을 담는 컨테이너 */
        .gallery-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 사진이 화면 비율에 맞게 꽉 차거나 여백을 두고 들어가도록 설정 */
        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* 사진 비율 유지 */
            user-select: none; /* 사진 선택 방지 */
        }

        /* 좌우 이동 버튼 스타일 */
        .nav-button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.3); /* 반투명 검은색 배경 */
            color: white;
            border: none;
            font-size: 3rem; /* 화살표 크기 */
            padding: 15px 25px;
            cursor: pointer;
            transition: background 0.3s ease;
            z-index: 10;
            border-radius: 10px;
        }

        .nav-button:hover {
            background: rgba(0, 0, 0, 0.8); /* 마우스 올렸을 때 더 진해짐 */
        }

        /* 버튼 위치 지정 */
        .prev { left: 20px; }
        .next { right: 20px; }

        /* 모바일 화면에서는 버튼을 조금 작게 조정 */
        @media (max-width: 600px) {
            .nav-button {
                font-size: 2rem;
                padding: 10px 15px;
            }
            .prev { left: 10px; }
            .next { right: 10px; }
        }
    </style>
</head>
<body>

    <div class="gallery-container">
        <!-- 이전 버튼 -->
        <button class="nav-button prev" onclick="changeImage(-1)">&#10094;</button>
        
        <!-- 메인 사진 -->
        <img id="mainImage" src="" alt="갤러리 사진">
        
        <!-- 다음 버튼 -->
        <button class="nav-button next" onclick="changeImage(1)">&#10095;</button>
    </div>

    <script>
        const images = [
            "./image001.jpg",  
            "./image002.jpg", 
            "./image003.jpg",  
            "./image004.jpg", 
            "./image005.jpg", 
            "./image006.jpg",  
            "./image007.jpg", 
            "./image008.jpg", 
        ];

        let currentIndex = 0;
        const imgElement = document.getElementById('mainImage');

        // 첫 번째 사진 로드하기
        if(images.length > 0) {
            imgElement.src = images[0];
        }

        // 사진 변경 함수
        function changeImage(direction) {
            currentIndex += direction;
            
            // 사진 배열 범위를 넘어가면 처음이나 끝으로 자연스럽게 이어지도록 처리
            if (currentIndex < 0) {
                currentIndex = images.length - 1; // 첫 사진에서 이전 누르면 마지막 사진으로
            } else if (currentIndex >= images.length) {
                currentIndex = 0; // 마지막 사진에서 다음 누르면 첫 사진으로
            }
            
            imgElement.src = images[currentIndex];
        }

        // 키보드 방향키(좌/우)로도 사진을 넘길 수 있게 추가
        document.addEventListener('keydown', function(event) {
            if (event.key === 'ArrowLeft') {
                changeImage(-1);
            } else if (event.key === 'ArrowRight') {
                changeImage(1);
            }
        });
    </script>

</body>
</html>
